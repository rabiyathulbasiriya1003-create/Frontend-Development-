<!DOCTYPE html>
<html>
<head>
    <title>Hover Effects with Image</title>
    <style>
        body {
            text-align:center;
            font-family:verdana;
            background-color:pink;
        }

        h2 {
            font-size:35px;
        }

        .btn {
            background-color:blue;
            color:white;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.4s;
        }

        .btn:hover {
            background-color:blueviolet;
            transform:scale(1.1);
        }

        .image {
            width: 200px;
            height: 200px;
            margin-top: 30px;
            border-radius: 10px;
            transition: 0.5s;
        }

        .image:hover {
            transform: scale(1.2);
            filter: brightness(120%);
        }
    </style>
</head>
<body>
    <h2>Hover Effects and Transitions</h2>
    <button class="btn">Hover Me</button>
    <div class="box"></div>
    <img src="image.jpg.jpeg".jfif class="image" alt="Sample Image">
</body>
</html>
