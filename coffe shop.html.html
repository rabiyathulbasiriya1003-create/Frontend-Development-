<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5e6d3;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #6f4e37;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #8b5a2b;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        .menu {
            background-color: white;
            margin: 20px auto;
            width: 300px;
            padding: 15px;
            border-radius: 10px;
        }

        footer {
            background-color: #6f4e37;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Coffee Shop</h1>
        <p>Fresh Coffee, Happy Life</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section>
        <h2>Welcome to Our Coffee Shop</h2>
        <p>Enjoy the best coffee in town!</p>

        <div class="menu">
            <h3>Our Menu</h3>
            <p>Espresso - ₹120</p>
            <p>Cappuccino - ₹150</p>
            <p>Latte - ₹180</p>
            <p>Cold Coffee - ₹200</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Coffee Shop. All Rights Reserved.</p>
    </footer>

</body>
</html>
